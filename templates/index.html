<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS — المساعد الذكي</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #1c1e1f;
  --surface:  #242628;
  --card:     #2b2e30;
  --border:   #3a3d40;
  --olive:    #a8b472;
  --olive2:   #c5cc7a;
  --olive3:   #7a8a4a;
  --fog:      #8a9090;
  --mist:     #b0b8b4;
  --text:     #dce0d8;
  --muted:    #5a6060;
  --rose:     #c4907a;
  --glow-o:   rgba(168,180,114,0.15);
  --glow-f:   rgba(138,144,144,0.12);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Tajawal', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  perspective: 900px;
}

/* ─── 3D SCENE LAYER ─── */
#scene3d {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  transform-style: preserve-3d;
}

/* Floating 3D planes */
.plane {
  position: absolute;
  border-radius: 6px;
  transform-style: preserve-3d;
  animation: float3d var(--dur, 12s) ease-in-out infinite;
  animation-delay: var(--del, 0s);
  opacity: 0.08;
}
.plane::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: inherit;
  transform: translateZ(-18px);
  opacity: 0.4;
}
.plane::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  border: 1px solid var(--olive);
  transform: translateZ(4px);
  opacity: 0.5;
}

.p1 { width:220px; height:140px; background:var(--olive3); top:8%; right:5%; --dur:14s; --del:0s; }
.p2 { width:160px; height:100px; background:var(--fog);    bottom:15%; left:4%; --dur:10s; --del:3s; }
.p3 { width:100px; height:60px;  background:var(--olive);  top:50%; left:10%; --dur:16s; --del:6s; }
.p4 { width:80px;  height:50px;  background:var(--mist);   bottom:35%; right:8%; --dur:11s; --del:1s; }

@keyframes float3d {
  0%   { transform: rotateX(10deg) rotateY(-12deg) translateZ(0px); }
  25%  { transform: rotateX(-8deg) rotateY(15deg)  translateZ(12px); }
  50%  { transform: rotateX(14deg) rotateY(-5deg)  translateZ(6px); }
  75%  { transform: rotateX(-5deg) rotateY(18deg)  translateZ(18px); }
  100% { transform: rotateX(10deg) rotateY(-12deg) translateZ(0px); }
}

/* Grid lines 3D */
.grid3d {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(168,180,114,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,180,114,0.025) 1px, transparent 1px);
  background-size: 52px 52px;
  transform: rotateX(55deg) scaleX(1.4) translateY(-40%) translateZ(-1px);
  transform-origin: center bottom;
  animation: gridDrift 20s linear infinite;
  opacity: 0.7;
}
@keyframes gridDrift {
  from { background-position: 0 0; }
  to   { background-position: 0 52px; }
}

/* Vignette */
body::after {
  content:'';
  position:fixed; inset:0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(15,16,17,0.85) 100%);
  pointer-events:none; z-index:1;
}

/* Noise grain */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none; z-index:2;
}

/* ─── HEADER ─── */
header {
  position: relative; z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(28,30,31,0.9);
  backdrop-filter: blur(20px);
}

.brand { display:flex; align-items:center; gap:14px; }

/* 3D rotating hex logo */
.brand-hex {
  width: 44px; height: 44px;
  position: relative;
  transform-style: preserve-3d;
  animation: logoSpin 8s ease-in-out infinite;
}
@keyframes logoSpin {
  0%   { transform: rotateY(0deg)   rotateX(0deg); }
  25%  { transform: rotateY(180deg) rotateX(10deg); }
  50%  { transform: rotateY(360deg) rotateX(0deg); }
  75%  { transform: rotateY(540deg) rotateX(-10deg); }
  100% { transform: rotateY(720deg) rotateX(0deg); }
}

.hex-face {
  position: absolute; inset: 0;
  display: flex; align-items:center; justify-content:center;
  clip-path: polygon(50% 0%,95% 25%,95% 75%,50% 100%,5% 75%,5% 25%);
  font-family:'IBM Plex Mono',monospace;
  font-size:15px; font-weight:600; color: var(--bg);
}
.hex-front { background: linear-gradient(135deg, var(--olive), var(--olive2)); }
.hex-back  {
  background: var(--olive3);
  transform: rotateY(180deg);
}

.brand-title {
  font-family:'IBM Plex Mono',monospace;
  font-size:1.2rem; font-weight:600;
  color:var(--olive); letter-spacing:5px;
}
.brand-sub {
  font-family:'IBM Plex Mono',monospace;
  font-size:0.62rem; color:var(--muted);
  letter-spacing:2px; margin-top:2px;
}

.tool-chips { display:flex; gap:8px; }
.chip {
  padding:5px 13px; border-radius:5px;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.68rem; letter-spacing:1px;
  border:1px solid; cursor:default;
  transition:all 0.3s;
  position: relative;
  transform-style: preserve-3d;
}
.chip::after {
  content:'';
  position:absolute;
  inset: 0;
  border-radius: inherit;
  background: inherit;
  transform: translateZ(-5px) translateY(3px);
  opacity: 0.35;
  filter: blur(2px);
}
.chip:hover {
  transform: translateY(-3px) rotateX(12deg);
  filter: brightness(1.3);
  box-shadow: 0 8px 20px rgba(0,0,0,0.35);
}
.chip-s { color:var(--olive);  border-color:rgba(168,180,114,0.3); background:rgba(168,180,114,0.08); }
.chip-a { color:var(--mist);   border-color:rgba(176,184,180,0.3); background:rgba(176,184,180,0.06); }
.chip-k { color:var(--fog);    border-color:rgba(138,144,144,0.3); background:rgba(138,144,144,0.06); }

/* ─── CHAT ─── */
.chat-area {
  position:relative; z-index:10;
  flex:1; overflow:hidden;
  display:flex; flex-direction:column;
  padding:0 24px;
}

#chatBox {
  flex:1; overflow-y:auto; padding:20px 0;
  display:flex; flex-direction:column; gap:14px;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
}
#chatBox::-webkit-scrollbar { width:3px; }
#chatBox::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* ─── WELCOME ─── */
.welcome {
  margin: auto; text-align:center;
  animation: riseIn3d 0.9s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes riseIn3d {
  from { opacity:0; transform: translateY(40px) rotateX(20deg); }
  to   { opacity:1; transform: translateY(0)    rotateX(0deg); }
}

/* 3D spinning orb */
.orb-wrap {
  width:90px; height:90px;
  margin: 0 auto 22px;
  position:relative;
  transform-style:preserve-3d;
  animation: orbFloat 6s ease-in-out infinite;
}
@keyframes orbFloat {
  0%,100% { transform: rotateY(0deg)   translateY(0px); }
  33%      { transform: rotateY(120deg) translateY(-8px); }
  66%      { transform: rotateY(240deg) translateY(4px); }
}

.orb-ring {
  position:absolute; inset:0;
  border-radius:50%;
  border:2px solid rgba(168,180,114,0.4);
  transform-style:preserve-3d;
  animation: ringTilt 4s ease-in-out infinite;
}
.orb-ring:nth-child(2) {
  border-color:rgba(138,144,144,0.3);
  transform: rotateX(60deg);
  animation-delay: 1s;
}
.orb-ring:nth-child(3) {
  border-color:rgba(176,184,180,0.2);
  transform: rotateX(60deg) rotateZ(60deg);
  animation-delay: 2s;
}
@keyframes ringTilt {
  0%,100% { opacity:0.4; }
  50%      { opacity:1; }
}

.orb-core {
  position:absolute;
  inset:20px;
  border-radius:50%;
  background: radial-gradient(circle at 35% 35%, var(--olive2), var(--olive3));
  box-shadow:
    0 0 20px rgba(168,180,114,0.3),
    inset 0 0 15px rgba(0,0,0,0.4);
  display:flex; align-items:center; justify-content:center;
  font-family:'IBM Plex Mono',monospace;
  font-size:1rem; color:var(--bg); font-weight:600;
}

.welcome h2 { font-size:1.45rem; font-weight:500; color:var(--text); margin-bottom:6px; }
.welcome p  { color:var(--muted); font-size:0.88rem; line-height:2; }

.hints { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:16px; }
.hint-btn {
  padding:7px 16px; border-radius:6px;
  background:var(--card); border:1px solid var(--border);
  color:var(--muted); font-size:0.82rem;
  cursor:pointer; transition:all 0.3s;
  font-family:'Tajawal',sans-serif;
  transform-style: preserve-3d;
}
.hint-btn:hover {
  border-color:var(--olive); color:var(--olive);
  background:rgba(168,180,114,0.07);
  transform: translateY(-3px) rotateX(8deg);
  box-shadow: 0 8px 18px rgba(0,0,0,0.3), 0 0 0 1px rgba(168,180,114,0.15);
}

/* ─── MESSAGES ─── */
.msg {
  display:flex; gap:10px; max-width:78%;
  animation: msgIn3d 0.45s cubic-bezier(.22,1,.36,1) forwards;
  transform-style: preserve-3d;
}
@keyframes msgIn3d {
  from { opacity:0; transform: translateY(14px) rotateX(15deg); }
  to   { opacity:1; transform: translateY(0)    rotateX(0deg); }
}
.msg.user  { align-self:flex-end; flex-direction:row-reverse; }
.msg.agent { align-self:flex-start; }

.av {
  width:34px; height:34px; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; flex-shrink:0;
  transition: transform 0.3s;
}
.msg:hover .av { transform: rotateY(20deg) scale(1.05); }

.msg.user  .av { background:rgba(196,144,122,0.1); border:1px solid rgba(196,144,122,0.25); }
.msg.agent .av { background:rgba(168,180,114,0.08); border:1px solid rgba(168,180,114,0.2); }

.msg-inner { display:flex; flex-direction:column; gap:4px; }

.tool-tag {
  font-family:'IBM Plex Mono',monospace;
  font-size:0.63rem; letter-spacing:1.5px;
  padding:2px 8px; border-radius:4px; width:fit-content;
}
.tt-s { color:var(--olive); background:rgba(168,180,114,0.08); border:1px solid rgba(168,180,114,0.2); }
.tt-a { color:var(--mist);  background:rgba(176,184,180,0.06); border:1px solid rgba(176,184,180,0.2); }
.tt-k { color:var(--fog);   background:rgba(138,144,144,0.06); border:1px solid rgba(138,144,144,0.2); }

.bubble {
  padding:11px 16px; border-radius:10px;
  line-height:1.85; font-size:0.93rem;
  transition: transform 0.3s, box-shadow 0.3s;
}
.bubble:hover {
  transform: translateZ(4px) translateY(-1px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}
.msg.user  .bubble {
  background:rgba(196,144,122,0.07);
  border:1px solid rgba(196,144,122,0.18);
  border-radius:10px 3px 10px 10px;
}
.msg.agent .bubble {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:3px 10px 10px 10px;
}

/* ─── TYPING ─── */
.typing-wrap {
  display:flex; gap:10px; align-self:flex-start;
  animation:msgIn3d 0.3s ease forwards;
}
.typing-av {
  width:34px; height:34px; border-radius:7px;
  background:rgba(168,180,114,0.08); border:1px solid rgba(168,180,114,0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:1rem;
  animation: avBob 2s ease-in-out infinite;
}
@keyframes avBob {
  0%,100% { transform: rotateX(0deg); }
  50%      { transform: rotateX(15deg) translateY(-2px); }
}
.dots {
  display:flex; gap:5px; align-items:center;
  padding:14px 18px; border-radius:3px 10px 10px 10px;
  background:var(--card); border:1px solid var(--border);
}
.dots span {
  width:7px; height:7px; border-radius:50%;
  background:var(--olive);
  animation:dotPop3d 1.4s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay:.2s; background:var(--fog); }
.dots span:nth-child(3) { animation-delay:.4s; background:var(--mist); }
@keyframes dotPop3d {
  0%,80%,100% { transform:scale(0.5) translateZ(0px); opacity:0.3; }
  40%          { transform:scale(1.1) translateZ(6px); opacity:1; }
}

/* ─── INPUT ─── */
.input-zone {
  position:relative; z-index:20;
  padding:14px 24px 20px;
  border-top:1px solid var(--border);
  background:rgba(28,30,31,0.92);
  backdrop-filter:blur(20px);
}

.status-row {
  display:flex; align-items:center; gap:7px; margin-bottom:10px;
}
.s-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--olive);
  animation:sPulse 2.8s ease-in-out infinite;
  box-shadow: 0 0 6px var(--olive);
}
@keyframes sPulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.3; transform:scale(0.7); box-shadow:none; }
}
.s-text {
  font-family:'IBM Plex Mono',monospace;
  font-size:0.63rem; color:var(--muted); letter-spacing:1px;
}

.input-row {
  display:flex; gap:10px; align-items:center;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:6px 6px 6px 18px;
  transition:all 0.35s;
  transform-style: preserve-3d;
}
.input-row:focus-within {
  border-color:rgba(168,180,114,0.4);
  box-shadow:
    0 0 0 3px rgba(168,180,114,0.06),
    0 8px 24px rgba(0,0,0,0.3),
    0 0 30px rgba(168,180,114,0.05);
  transform: rotateX(1.5deg) translateY(-1px);
}
.input-row input {
  flex:1; background:transparent; border:none; outline:none;
  color:var(--text); font-family:'Tajawal',sans-serif;
  font-size:1rem; direction:rtl;
}
.input-row input::placeholder { color:var(--muted); }

.send {
  width:42px; height:42px; border-radius:8px; border:none;
  background:linear-gradient(135deg, var(--olive), var(--olive2));
  color:var(--bg); font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.25s; flex-shrink:0;
  font-weight:bold;
  transform-style: preserve-3d;
  position: relative;
}
.send::after {
  content:'';
  position:absolute; inset:0;
  border-radius:inherit;
  background:var(--olive3);
  transform: translateZ(-6px) translateY(4px);
  opacity:0.5;
  transition: all 0.25s;
}
.send:hover {
  transform: translateY(-3px) rotateX(10deg);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4), 0 0 15px rgba(168,180,114,0.2);
}
.send:active {
  transform: translateY(1px) rotateX(-5deg);
}
.send:active::after { transform: translateZ(-2px) translateY(1px); }
.send:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; transform:none; box-shadow:none; }
.send:disabled::after { display:none; }

.foot-hint {
  text-align:center; margin-top:9px;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.62rem; color:var(--muted); letter-spacing:1px;
}
</style>
</head>
<body>

<div id="scene3d">
  <div class="plane p1"></div>
  <div class="plane p2"></div>
  <div class="plane p3"></div>
  <div class="plane p4"></div>
</div>
<div class="grid3d"></div>

<header>
  <div class="brand">
    <div class="brand-hex">
      <div class="hex-face hex-front">N</div>
      <div class="hex-face hex-back">X</div>
    </div>
    <div>
      <div class="brand-title">NEXUS</div>
      <div class="brand-sub">INTELLIGENT AGENT v2</div>
    </div>
  </div>
  <div class="tool-chips">
    <span class="chip chip-s">⬡ SEARCH</span>
    <span class="chip chip-a">◈ CALC</span>
    <span class="chip chip-k">◉ WEATHER</span>
  </div>
</header>

<div class="chat-area">
  <div id="chatBox">
    <div class="welcome" id="welcomeBlock">
      <div class="orb-wrap">
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div class="orb-ring"></div>
        <div class="orb-core">N</div>
      </div>
      <h2>مرحباً، أنا NEXUS</h2>
      <p>مساعدك الذكي — أختار الأداة الأنسب تلقائياً<br>بحث · حسابات · طقس</p>
      <div class="hints">
        <button class="hint-btn" onclick="fill('طقس الرياض')">🌤 طقس الرياض</button>
        <button class="hint-btn" onclick="fill('كم 1800 * 12')">🧮 1800 × 12</button>
        <button class="hint-btn" onclick="fill('من هو ابن خلدون')">🔍 ابن خلدون</button>
        <button class="hint-btn" onclick="fill('ما هو الذكاء الاصطناعي')">🔍 الذكاء الاصطناعي</button>
      </div>
    </div>
  </div>
</div>

<div class="input-zone">
  <div class="status-row">
    <div class="s-dot"></div>
    <span class="s-text" id="statusText">NEXUS ONLINE — جاهز</span>
  </div>
  <div class="input-row">
    <input type="text" id="inp" placeholder="اسألني أي شيء..." autocomplete="off"/>
    <button class="send" id="sendBtn" onclick="send()">➤</button>
  </div>
  <div class="foot-hint">ENTER للإرسال &nbsp;·&nbsp; بحث معلوماتي · حاسبة · طقس</div>
</div>

<script>
const toolMeta = {
  search:     { tag:'SEARCH',  cls:'tt-s', av:'🔍' },
  calculator: { tag:'CALC',    cls:'tt-a', av:'🧮' },
  weather:    { tag:'WEATHER', cls:'tt-k', av:'🌤' }
};

function fill(t) {
  document.getElementById('inp').value = t;
  document.getElementById('inp').focus();
}

function clearWelcome() {
  const w = document.getElementById('welcomeBlock');
  if (w) {
    w.style.transition = 'opacity 0.3s, transform 0.3s';
    w.style.opacity = '0';
    w.style.transform = 'rotateX(-20deg) translateY(-20px)';
    setTimeout(()=>w.remove(), 320);
  }
}

function addUser(text) {
  const box = document.getElementById('chatBox');
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="av">👤</div><div class="msg-inner"><div class="bubble">${text}</div></div>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function addAgent(text, tool) {
  const box = document.getElementById('chatBox');
  const m = toolMeta[tool] || toolMeta.search;
  const el = document.createElement('div');
  el.className = 'msg agent';
  el.innerHTML = `
    <div class="av">${m.av}</div>
    <div class="msg-inner">
      <span class="tool-tag ${m.cls}">${m.tag}</span>
      <div class="bubble">${text}</div>
    </div>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function addTyping() {
  const box = document.getElementById('chatBox');
  const el = document.createElement('div');
  el.className = 'typing-wrap'; el.id = 'typing';
  el.innerHTML = `<div class="typing-av">⚡</div><div class="dots"><span></span><span></span><span></span></div>`;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function setStatus(txt) {
  document.getElementById('statusText').textContent = txt;
}

async function send() {
  const inp = document.getElementById('inp');
  const btn = document.getElementById('sendBtn');
  const msg = inp.value.trim();
  if (!msg) return;

  clearWelcome();
  addUser(msg);
  inp.value = '';
  btn.disabled = true;
  inp.disabled = true;
  setStatus('NEXUS يفكر...');
  addTyping();

  try {
    const res  = await fetch('/ask', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({message: msg})
    });
    const data = await res.json();
    removeTyping();
    addAgent(data.answer, data.tool_used);
    setStatus('NEXUS ONLINE — جاهز');
  } catch {
    removeTyping();
    addAgent('⚠ تعذّر الاتصال — تأكد أن السيرفر يعمل', 'search');
    setStatus('NEXUS ONLINE — جاهز');
  }

  btn.disabled = false;
  inp.disabled = false;
  inp.focus();
}

document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('sendBtn').disabled) send();
});

/* Subtle 3D tilt on mouse move */
document.addEventListener('mousemove', e => {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const rx = ((e.clientY - cy) / cy) * 2.5;
  const ry = ((e.clientX - cx) / cx) * -2.5;
  document.getElementById('scene3d').style.transform =
    `rotateX(${rx}deg) rotateY(${ry}deg)`;
});
</script>
